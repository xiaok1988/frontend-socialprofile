<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Social links profile</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
        color: hsl(0, 0%, 100%);
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <header></header>
    <main class="container">
      <div class="card">
        <div class="avartar">
          <img
            class="avartar-image"
            src="assets/images/avatar-jessica.jpeg"
            alt="avatar"
          />
        </div>
        <div class="name-section"><span>Jessica Randall</span></div>
        <div class="region-section"><span>London, United Kingdom</span></div>
        <div class="quote-section">"Front-end developer and avid reader."</div>
        <ul class="profile-list">
          <li class="profile-item"><span>GitHub</span></li>
          <li class="profile-item"><span>Frontend Mentor</span></li>
          <li class="profile-item"><span>LinkedIn</span></li>
          <li class="profile-item"><span>Twitter</span></li>
          <li class="profile-item"><span>Instagram</span></li>
        </ul>
      </div>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">程锴</a>.
    </footer>
  </body>
</html>
